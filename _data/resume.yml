research_projects:
  - title: "Signature methods for optimal control"
    status: "in progress"
    bullets:
      - "Using path signatures (rough path theory) to learn approximate-optimal policies directly from time-series via REINFORCE."
      - "Connects modern ML with classical stochastic control."
    links:
      - { label: "Code (sigReinforce)", href: "https://github.com/GennaroAlberto/sigReinforce" }
  - title: "Delegating portfolio management under time uncertainty"
    bullets:
      - "Principal–agent theory with a Second Order BSDE (2BSDE) under default risk; new HJB PDE."
      - "Iterative Physics-Informed Neural Network (PINN) solver in TensorFlow."
      - "Best Paper Finalist (top 6) at SIAM Conference on Financial Mathematics 2025."
    links:
      - { label: "Paper code", href: "https://github.com/GennaroAlberto/PrincipalAgent" }
  - title: "2BSDE with uncertain horizon and control in erratic environments"
    bullets:
      - "Existence and uniqueness for a class of non-Markovian 2BSDEs with random horizon."
      - "Framework for robust control under both volatility and time uncertainty."
  - title: "Predictive maintenance for rail systems — INFORMS RAS 2025"
    status: "2nd place"
    bullets:
      - "With my team MathConvoy, we placed second at the [INFORMS RAS 2025 Problem Solving Competition](https://connect.informs.org/discussion/2025-informs-ras-problem-solving-competition-1) at the 2025 INFORMS Annual Meeting."
      - "Using operations research and advanced analytical approaches, we created a predictive maintenance tool for rail systems. Using wheel-profile data, mileage, railcar attributes and other sensor measurements, the tool predicts wheel failures on commercial trains."
      - "Joint work with my teammates [Daniele Gioia](https://github.com/DanieleGioia), Jacopo Bonari, and Edoardo Fadda; the team code is shared in Daniele's repository."
    links:
      - { label: "Competition", href: "https://connect.informs.org/discussion/2025-informs-ras-problem-solving-competition-1" }
      - { label: "Team code (shared)", href: "https://github.com/DanieleGioia/RAS2025" }
  - title: "Linear decision rules for multi-stage stochastic programs (M.Sc. thesis)"
    bullets:
      - "Tractable approximations of large-scale multi-stage stochastic programs via linear decision rules, applied to an assemble-to-order (ATO) problem."
      - "Advised by Prof. Brandimarte and Prof. Fadda (Politecnico di Torino)."
      - "Repository cleaned and maintained by my collaborator [Daniele Gioia](https://github.com/DanieleGioia)."
    links:
      - { label: "ATO code", href: "https://github.com/DanieleGioia/ATO" }

